<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrador - CheckUp</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

    <div class="sidebar">
        <h2 class="logo">CheckUp</h2>
        <ul>
            <li><a href="../inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="../EMPLEADO/empleado.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
            <li><a href="../ADMIN/admin.html"><i class="fas fa-cog"></i> Administrador</a></li>
        </ul>
    </div>

    <div class="contenedor">

        <div id="loginAdmin">
            <h1>Panel Administrador</h1>
            <input type="text" id="usuarioAdmin" placeholder="Usuario">
            <input type="password" id="passwordAdmin" placeholder="Contraseña">

            <button class="btn-asistencia" onclick="iniciarSesionAdmin()">
                Ingresar
            </button>
        </div>

        <div id="panelAdmin" style="display:none;">
    <h1>Dashboard</h1>

    <div class="dashboard-flex">
        
        <div class="izquierda-tabla">

            <h3>Registros de Asistencia</h3>
            <table id="tablaAsistenciaAdmin">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Número Empleado</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="derecha-stats">
            <div class="dashboard-resumen">
                <div class="card-grafica">
                    <h3>Estado de Asistencia Hoy</h3>
                    <canvas id="graficaAsistencia"></canvas>
                </div>
            </div>

            <div class="card-grafica">
                <h3>Asistencias por Departamento</h3>
                <canvas id="graficaDepartamentos"></canvas>
            </div>

            <button class="btn-cierreSesion" onclick="cerrarSesionAdmin()">
                Cerrar Sesión
            </button>
        </div>

    </div> </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>
</body>
</html>
