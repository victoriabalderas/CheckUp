<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Empleado - CheckUp</title>
    <link rel="stylesheet" href="../estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <h2 class="logo">CheckUp</h2>
        <ul>
            <li><a href="../inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="empleado.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
            <li><a href="../ADMIN/admin.html"><i class="fas fa-cog"></i> Administrador</a></li>
        </ul>
    </div>

    <div class="contenedor">

        <div id="loginEmpleado">
            <h1>Portal Empleado</h1>

            <input type="text" id="usuario" placeholder="Número de empleado">
            <input type="password" id="password" placeholder="Contraseña">

            <button onclick="iniciarSesion()">Iniciar Sesión</button>

        </div>

        <!-- DATOS DEL EMPLEADO (OCULTOS) -->
        <!-- 👤 PANEL EMPLEADO -->
        <div id="panelEmpleado" style="display:none;">
            <h1>Bienvenido</h1>

            <h2>Datos del Empleado</h2>

            <table id="tablaDatos">
                <tbody>
                    <tr>
                        <td><strong>Número</strong></td>
                        <td id="numEmpleado"></td>
                    </tr>
                    <tr>
                        <td><strong>Nombre</strong></td>
                        <td id="nombreEmpleado"></td>
                    </tr>
                    <tr>
                        <td><strong>Puesto</strong></td>
                        <td id="puestoEmpleado"></td>
                    </tr>
                    <tr>
                        <td><strong>Área</strong></td>
                        <td id="areaEmpleado"></td>
                    </tr>
                </tbody>
            </table>

            <h2>Asistencia</h2>

            <table id="tablaAsistencia">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

    </div>

    <script src="empleado.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <canvas id="grafica"></canvas>

</body>
</html>
